name: Build ARM64
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          install: >-
            mingw-w64-clang-aarch64-clang
            mingw-w64-clang-aarch64-dlfcn
            make
            git

      - name: Build
        shell: msys2 {0}
        run: make msys2

      - uses: actions/upload-artifact@v4
        with:
          name: mintty-arm64
          path: bin/mintty.exe
