name: Build ARM64
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          install: >-
            mingw-w64-clang-aarch64-clang
            mingw-w64-clang-aarch64-dlfcn
            make
            git
            diffutils

      - name: Build
        shell: msys2 {0}
        run: make msys2

      - name: Smoke test
        shell: msys2 {0}
        timeout-minutes: 1
        run: |
          bin/mintty.exe --version
          bin/mintty.exe --help
          bin/mintty.exe -e cmd /c exit 0
          echo "ConPTY spawn+exit OK"

      - uses: actions/upload-artifact@v4
        with:
          name: mintty-arm64
          path: bin/mintty.exe
