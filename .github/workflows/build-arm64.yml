name: Build ARM64
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: windows-11-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          install: >-
            mingw-w64-clang-aarch64-clang
            mingw-w64-clang-aarch64-dlfcn
            make
            git
            diffutils

      - name: Build
        shell: msys2 {0}
        run: make msys2

      - name: Smoke test
        shell: msys2 {0}
        timeout-minutes: 1
        run: |
          bin/mintty.exe --version
          bin/mintty.exe --help
          bin/mintty.exe -e cmd /c exit 0
          echo "ConPTY spawn+exit OK"

      - name: Package
        shell: msys2 {0}
        run: |
          mkdir -p pkg
          cp bin/mintty.exe           pkg/
          cp install.bat              pkg/
          cp config-distros-arm64.ps1 pkg/
          cp dequote.bat cmd2.bat uninstall.bat mkshortcut.vbs pkg/
          cp tux.ico LICENSE.mintty VERSION pkg/
          cp "wsltty home & help.url" pkg/
          cp makewinx-arm64.cfg       pkg/

      - name: Build installer
        shell: msys2 {0}
        run: |
          version=$(cat VERSION)
          cd pkg
          sed -e "s,%version%,$version," -e "s/^InstallPrompt=.*/InstallPrompt=/" makewinx-arm64.cfg > wsltty-arm64.SED
          iexpress /n /q wsltty-arm64.SED

      - uses: actions/upload-artifact@v4
        with:
          name: wsltty-arm64
          path: pkg/wsltty-*-arm64-install.exe
